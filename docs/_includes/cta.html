{% assign cta = site.data.strings.cta %}
<section class="cta">
	<h2 class="cta__title">{{ cta.title }}</h2>
	<p class="cta__subtitle">{{ cta.subtitle_prefix }} <span class="accent accent--wave accent--italic">{{ cta.subtitle_accent }}</span></p>
	<div class="cta__button">
		{% include download-button.html %}
	</div>
	<p class="cta__note">{{ cta.note }}</p>
</section>
